<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Please Forgive Me 🥺</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffe6f0, #fff5f8);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        max-width: 500px;
        position: relative;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.1rem;
        color: #555;
    }

    button {
        padding: 12px 20px;
        margin: 15px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    #yesBtn {
        background: #ff4d88;
        color: white;
    }

    #noBtn {
        background: #ddd;
        position: absolute;
    }

    .hidden {
        display: none;
    }

    .laugh {
        font-size: 1.5rem;
        margin-top: 20px;
        color: #ff4d88;
        animation: bounce 1s infinite;
    }

    @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
</style>
</head>
<body>

<div class="container">
    <h1>🥺 Sorry My Sunflower ❤️</h1>
    <p>
        I know you are angry… and honestly, even Google cannot search how cute you look when you're angry 😭❤️
    </p>

    <button id="yesBtn" onclick="forgive()">Okay, I forgive you 💖</button>
    <button id="noBtn">Still Angry 😤</button>

    <div id="message" class="hidden">
        <p class="laugh">
            YAYYY 😍❤️<br>
            Mission Successful: JAAN Mood Restored 🎉
        </p>
        <p>
            As compensation, I owe you one treat + unlimited hugs + mood swings handling package 😌💐
        </p>
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 300;
        const y = Math.random() * 300;
        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    });

    function forgive() {
        document.getElementById("message").classList.remove("hidden");
    }
</script>

</body>
</html>
